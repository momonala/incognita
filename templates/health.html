<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health | Incognita</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.25/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>
    <script src="{{ url_for('static', filename='table_utils.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.1/dist/apexcharts.min.js"></script>
</head>
<body>
    {% include 'navbar.html' %}

    <main class="health-page">

        <div class="health-controls" role="toolbar" aria-label="Health filters">
            <div class="health-controls__group" role="group" aria-label="Metric">
                <button class="ctrl-btn ctrl-btn--active" data-metric="step_count">Steps</button>
                <button class="ctrl-btn" data-metric="distance">Distance</button>
                <button class="ctrl-btn" data-metric="active_energy">Calories</button>
                <button class="ctrl-btn" data-metric="flights_climbed">Flights</button>
            </div>

            <div class="health-controls__group" role="group" aria-label="Time range">
                <button class="ctrl-btn" data-range="7">7D</button>
                <button class="ctrl-btn ctrl-btn--active" data-range="30">1M</button>
                <button class="ctrl-btn" data-range="90">3M</button>
                <button class="ctrl-btn" data-range="365">1Y</button>
                <button class="ctrl-btn" data-range="0">All</button>
            </div>

            <div class="health-controls__group health-controls__group--dates" id="customDates" style="display:none;" aria-label="Custom date range">
                <input type="date" id="dateFrom" class="ctrl-input" aria-label="From date">
                <span class="health-controls__sep">—</span>
                <input type="date" id="dateTo" class="ctrl-input" aria-label="To date">
            </div>

        </div>

        <div class="health-stats" role="region" aria-label="Summary statistics">
            <div class="stat-card stat-card--compact">
                <span class="stat-card__label">Samples</span>
                <span class="stat-card__value" id="statCount">—</span>
            </div>
            <div class="stat-card stat-card--compact">
                <span class="stat-card__label" id="statMainLabel">Average</span>
                <span class="stat-card__value" id="statMain">—</span>
            </div>
            <div class="stat-card stat-card--compact">
                <span class="stat-card__label">Min</span>
                <span class="stat-card__value" id="statMin">—</span>
            </div>
            <div class="stat-card stat-card--compact">
                <span class="stat-card__label">Max</span>
                <span class="stat-card__value" id="statMax">—</span>
            </div>
            <div class="stat-card stat-card--compact">
                <span class="stat-card__label">Average</span>
                <span class="stat-card__value" id="statAvg">—</span>
            </div>
            <div class="stat-card stat-card--compact" id="statDaysCard">
                <span class="stat-card__label">Days</span>
                <span class="stat-card__value" id="statDays">—</span>
            </div>
        </div>

        <div class="health-content">
            <section class="health-chart-card" aria-label="Chart">
                <div class="hchart__head">
                    <span class="hchart__title" id="chartTitle">Steps</span>
                    <span class="hchart__range" id="chartRange">30D</span>
                </div>
                <div id="healthChart" class="hchart__plot"></div>
            </section>

            <section class="health-table-wrap" aria-label="Daily totals by metric">
                <table class="data-table datatable" id="healthTable">
                    <thead>
                        <tr>
                            <th scope="col">Day</th>
                            <th scope="col">Steps</th>
                            <th scope="col">Distance (km)</th>
                            <th scope="col">Calories (kcal)</th>
                            <th scope="col">Flights</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot>
                        <tr><th></th><th></th><th></th><th></th><th></th></tr>
                    </tfoot>
                </table>
            </section>
        </div>

    </main>

<script>
(function () {
    // ── State ────────────────────────────────────────────────────────────────
    let currentMetric = 'step_count';
    let currentRange  = 30;      // days; 0 = all
    let dateFrom = '';
    let dateTo   = '';

    // ── DataTable ────────────────────────────────────────────────────────────
    // 5 columns: Day, Steps, Distance, Calories, Flights
    const colFilters = ['', '', '', '', ''];

    function matchFilter(cellValue, filterValue) {
        if (filterValue === '') return true;
        const op = filterValue[0];
        if (op === '>' || op === '<') {
            const threshold = parseFloat(filterValue.slice(1).trim());
            const num       = parseFloat(String(cellValue).replace(/,/g, ''));
            if (!isNaN(num) && !isNaN(threshold)) {
                return op === '>' ? num > threshold : num < threshold;
            }
        }
        return String(cellValue).toLowerCase().includes(filterValue.toLowerCase());
    }

    $.fn.dataTable.ext.search.push(function (_settings, rowData) {
        return colFilters.every((f, i) => matchFilter(rowData[i], f));
    });

    const PLACEHOLDERS = ['e.g. 2024-01', '>5000', '>5', '>500', '>5'];

    let filterTimer = null;
    function scheduleRedraw() {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(() => dt.draw(), 200);
    }

    const dt = $('#healthTable').DataTable({
        paging:    true,
        searching: true,
        dom:       'lrtip',
        ordering:  true,
        pageLength: 25,
        order:     [[0, 'desc']],
        language:  { emptyTable: 'No data for this range.' },
        columnDefs: [{ type: 'num', targets: [1, 2, 3, 4] }],
        initComplete: function () {
            this.api().columns().every(function (i) {
                const input = $('<input type="text">').attr('placeholder', PLACEHOLDERS[i]);
                $(this.footer()).empty().append(input);
                input.on('input', function () {
                    colFilters[i] = this.value;
                    scheduleRedraw();
                });
            });
        },
    });


    // ── Multi-metric line chart (ApexCharts) ─────────────────────────────────
    // All four metrics share one chart. Each gets its own right-side y-axis
    // (units differ by orders of magnitude), so the lines compare *shape*, not
    // magnitude. The active metric is brought forward at full intensity with a
    // gradient area fill; the others dim to faint lines.
    //
    // One electric colour per metric.
    const METRICS = [
        { key: 'step_count',      name: 'Steps',    unit: 'steps',  color: '#2b8fff', decimals: 0 },
        { key: 'distance',        name: 'Distance', unit: 'km',     color: '#00e0c6', decimals: 1 },
        { key: 'active_energy',   name: 'Calories', unit: 'kcal',   color: '#ff3d8b', decimals: 0 },
        { key: 'flights_climbed', name: 'Flights',  unit: 'floors', color: '#a259ff', decimals: 0 },
    ];

    // Chart chrome (grid, axis labels) reads the same design tokens as the rest
    // of the page, so a theme change stays a one-line edit in styles.css.
    const cssToken = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const COLOR_GRID = cssToken('--color-border-light');
    const COLOR_AXIS = cssToken('--color-text-secondary');

    // Dim inactive traces by dropping their stroke colour to a low alpha; the
    // active metric keeps its full-intensity neon.
    const DIM_ALPHA = 0.22;
    const hexToRgba = (hex, a) => {
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;
    };
    const traceColors = key => METRICS.map(m => m.key === key ? m.color : hexToRgba(m.color, DIM_ALPHA));

    let chartRows = [];   // ascending-by-day rows from /health/table, cached for redraws
    let chart = null;

    const fmtNum = (v, d) => v == null ? '' : (+v).toLocaleString(undefined, { maximumFractionDigits: d });
    const activeIndex = key => Math.max(0, METRICS.findIndex(m => m.key === key));

    // On mobile only the active metric is drawn; the others are sent as empty
    // series so the single trace gets the full width.
    function buildSeries(rows, activeKey) {
        const mobile = isMobile();
        return METRICS.map(m => ({
            name: m.name,
            data: (mobile && m.key !== activeKey)
                ? []
                : rows.map(r => [Date.parse(r.day), r[m.key] === '' || r[m.key] == null ? null : +r[m.key]]),
        }));
    }

    // Active trace pops with a thick full-intensity line and a gradient fill;
    // the rest stay as thin, unfilled lines.
    const strokeWidths = key => METRICS.map(m => m.key === key ? 3 : 1.5);
    const fillOpacities = key => METRICS.map(m => m.key === key ? 0.85 : 0);

    const isMobile = () => window.matchMedia('(max-width: 640px)').matches;

    // One y-axis per metric. The active metric's axis sits on the LEFT; the
    // other three on the right. On phones there's no room for four scales, so
    // only the active axis is shown — the other traces still draw against their
    // (hidden) axes and remain in the tooltip.
    function buildYAxis(activeKey) {
        const mobile = isMobile();
        return METRICS.map(m => {
            const active = m.key === activeKey;
            const visible = active || !mobile;
            return {
                seriesName: m.name,
                opposite: !active,
                show: visible,
                showAlways: visible,
                tickAmount: 4,
                min: 0,
                forceNiceScale: true,
                axisBorder: { show: false },
                axisTicks: { show: false },
                title: visible ? { text: m.unit, style: { color: m.color, fontSize: '11px', fontWeight: 400 } } : undefined,
                labels: {
                    style: { colors: m.color, fontSize: '11px' },
                    formatter: v => fmtNum(v, m.decimals),
                },
            };
        });
    }

    function updateChartTitle(activeKey) {
        const m = METRICS[activeIndex(activeKey)];
        const el = document.getElementById('chartTitle');
        el.textContent = m.name;
        el.style.color = m.color;
    }

    function buildChartOptions(activeKey) {
        return {
            series: buildSeries(chartRows, activeKey),
            chart: {
                type: 'area',
                height: 340,
                background: 'transparent',
                fontFamily: 'inherit',
                foreColor: COLOR_AXIS,
                toolbar: { show: false },
                zoom: { enabled: true, type: 'x', autoScaleYaxis: true },
                animations: { enabled: true, easing: 'easeinout', speed: 450 },
            },
            theme: { mode: 'light' },
            colors: traceColors(activeKey),
            stroke: { curve: 'smooth', width: strokeWidths(activeKey), lineCap: 'round' },
            fill: {
                type: 'gradient',
                gradient: {
                    shade: 'light',
                    type: 'vertical',
                    shadeIntensity: 0,
                    opacityFrom: fillOpacities(activeKey),
                    opacityTo: 0,
                    stops: [0, 100],
                },
            },
            dataLabels: { enabled: false },
            grid: {
                borderColor: COLOR_GRID,
                xaxis: { lines: { show: true } },
                yaxis: { lines: { show: false } },
                padding: { left: 4, right: 4 },
            },
            xaxis: {
                type: 'datetime',
                axisBorder: { show: false },
                axisTicks: { show: false },
                tooltip: { enabled: false },
                labels: { datetimeUTC: false, style: { colors: COLOR_AXIS, fontSize: '11px' } },
            },
            yaxis: buildYAxis(activeKey),
            legend: { show: false },
            markers: { size: 0, hover: { size: 4 } },
            tooltip: {
                shared: true,
                intersect: false,
                theme: 'light',
                x: { format: 'ddd, MMM d' },
                y: { formatter: (v, { seriesIndex }) => v == null ? '—' : `${fmtNum(v, METRICS[seriesIndex].decimals)} ${METRICS[seriesIndex].unit}` },
            },
        };
    }

    function renderChart(rows, activeKey) {
        chartRows = rows;
        updateChartTitle(activeKey);
        if (!chart) {
            chart = new ApexCharts(document.getElementById('healthChart'), buildChartOptions(activeKey));
            chart.render();
            return;
        }
        chart.updateSeries(buildSeries(rows, activeKey), false);
        highlightTrace(activeKey);
    }

    // Cheap restyle when only the active metric changes (no data refetch):
    // emphasise its line + fill, and move its y-axis to the left.
    function highlightTrace(activeKey) {
        updateChartTitle(activeKey);
        chart.updateOptions({
            colors: traceColors(activeKey),
            stroke: { width: strokeWidths(activeKey) },
            fill: { gradient: { opacityFrom: fillOpacities(activeKey) } },
            yaxis: buildYAxis(activeKey),
        }, false, false);
    }

    // ── Stats cards ──────────────────────────────────────────────────────────
    function updateStats(stats, chartData) {
        const fmt = n => n == null ? '—' : Number.isInteger(n) ? n.toLocaleString() : (+n).toLocaleString(undefined, { maximumFractionDigits: 1 });
        document.getElementById('statCount').textContent   = fmt(stats.count);
        document.getElementById('statMin').textContent     = fmt(stats.min)  + ' ' + (stats.unit || '');
        document.getElementById('statMax').textContent     = fmt(stats.max)  + ' ' + (stats.unit || '');
        document.getElementById('statAvg').textContent     = fmt(stats.mean) + ' ' + (stats.unit || '');
        document.getElementById('statDays').textContent    = chartData.length;

        const isSum = stats.agg === 'sum';
        document.getElementById('statMainLabel').textContent = isSum ? 'Total' : 'Average';
        const mainVal = isSum ? stats.total : stats.mean;
        document.getElementById('statMain').textContent = fmt(mainVal) + ' ' + (stats.unit || '');
    }

    // ── Table ────────────────────────────────────────────────────────────────
    function fmt(v, decimals) {
        return v === '' || v == null ? '—' : (+v).toLocaleString(undefined, { maximumFractionDigits: decimals });
    }

    // The /health/table endpoint already returns every metric per day, so it
    // feeds both the DataTable and the multi-trace chart from a single fetch.
    function loadTableAndChart() {
        const params = new URLSearchParams();
        if (dateFrom) params.set('from', dateFrom);
        if (dateTo)   params.set('to',   dateTo);

        fetch('/health/table?' + params)
            .then(r => r.json())
            .then(rows => {
                dt.clear();
                dt.rows.add(rows.map(r => [
                    r.day                || '—',
                    r.step_count         !== '' ? +r.step_count         : '',
                    r.distance           !== '' ? +r.distance           : '',
                    r.active_energy      !== '' ? +r.active_energy      : '',
                    r.flights_climbed    !== '' ? +r.flights_climbed     : '',
                ]));
                dt.draw();

                // Chart wants ascending days; the table endpoint returns them descending.
                chartRows = rows.slice().sort((a, b) => a.day.localeCompare(b.day));
                renderChart(chartRows, currentMetric);
            })
            .catch(() => { dt.clear().draw(); chartRows = []; renderChart([], currentMetric); });
    }

    // ── Date range helpers ───────────────────────────────────────────────────
    function setDateRange(rangeDays) {
        if (rangeDays === 0) {
            dateFrom = '';
            dateTo   = '';
        } else {
            const to   = new Date();
            const from = new Date(to);
            from.setDate(from.getDate() - rangeDays);
            dateTo   = to.toISOString().slice(0, 10);
            dateFrom = from.toISOString().slice(0, 10);
        }
        document.getElementById('dateFrom').value = dateFrom;
        document.getElementById('dateTo').value   = dateTo;
    }

    // ── Stats cards (active metric only, via /health/data) ───────────────────
    function loadStats() {
        const params = new URLSearchParams({ metric: currentMetric });
        if (dateFrom) params.set('from', dateFrom);
        if (dateTo)   params.set('to',   dateTo);

        fetch('/health/data?' + params)
            .then(r => r.json())
            .then(data => {
                if (!data.chart || data.chart.length === 0) {
                    document.getElementById('statCount').textContent = '0';
                    ['statMain', 'statMin', 'statMax', 'statAvg', 'statDays'].forEach(id => {
                        document.getElementById(id).textContent = '—';
                    });
                    return;
                }
                updateStats(data.stats, data.chart);
            })
            .catch(() => {});
    }

    // ── Event wiring ─────────────────────────────────────────────────────────
    document.querySelectorAll('[data-metric]').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('[data-metric]').forEach(b => b.classList.remove('ctrl-btn--active'));
            this.classList.add('ctrl-btn--active');
            currentMetric = this.dataset.metric;
            if (chart) renderChart(chartRows, currentMetric);  // restyle (+ swap trace on mobile), no refetch
            loadStats();
        });
    });

    document.querySelectorAll('[data-range]').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('ctrl-btn--active'));
            this.classList.add('ctrl-btn--active');
            currentRange = parseInt(this.dataset.range, 10);
            document.getElementById('customDates').style.display = 'none';
            document.getElementById('chartRange').textContent = currentRange === 0 ? 'All' : currentRange + 'D';
            setDateRange(currentRange);
            loadStats();
            loadTableAndChart();
        });
    });

    ['dateFrom', 'dateTo'].forEach(id => {
        document.getElementById(id).addEventListener('change', function () {
            dateFrom = document.getElementById('dateFrom').value;
            dateTo   = document.getElementById('dateTo').value;
            document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('ctrl-btn--active'));
            document.getElementById('customDates').style.display = 'flex';
            document.getElementById('chartRange').textContent = 'Custom';
            loadStats();
            loadTableAndChart();
        });
    });

    // Rebuild the axes when crossing the mobile breakpoint (orientation / resize).
    let wasMobile = isMobile();
    window.addEventListener('resize', () => {
        const now = isMobile();
        if (now !== wasMobile) {
            wasMobile = now;
            if (chart) renderChart(chartRows, currentMetric);  // rebuild traces + axes for the new layout
        }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    // Trigger the 30-day button click to properly initialize all state
    document.querySelector('[data-range="30"]').click();
})();
</script>
</body>
</html>
