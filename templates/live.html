<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live | Incognita</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
    <script src="https://unpkg.com/@deck.gl/geo-layers@^9.0.0/dist.min.js"></script>
</head>
<body>
    {% include 'navbar.html' %}

    <main class="live-page">
        {% if no_data %}
            <div class="live-empty" aria-label="No data">
                <p>No GPS data found in the last 7 days.</p>
            </div>
        {% else %}
            <section class="live-map" aria-label="Live location map">
                <div id="live-deck-container"></div>

                <div class="live-overlay" role="status" aria-live="polite" aria-label="Last known location">
                    <span class="live-dot {{ staleness_color }}" id="live-dot"></span>
                    <span class="live-time" id="live-timestamp"></span>
                    <button class="live-refresh" id="live-refresh-btn" aria-label="Refresh">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>
            </section>
        {% endif %}
    </main>

    {% if not no_data %}
    <script>
(function () {
    let LAT = {{ lat }};
    let LON = {{ lon }};
    let FIX_TIME = new Date({{ last_updated_iso | tojson }});
    let HEARTBEAT_TIME = {{ last_heartbeat_iso | tojson }} ? new Date({{ last_heartbeat_iso | tojson }}) : null;

    const MAPBOX_TOKEN    = {{ mapbox_api_key | tojson }};
    const ORANGE          = [255, 111, 0];
    const DOT_RADIUS_PX   = 8;
    const PULSE_MIN_PX    = 14;
    const PULSE_MAX_PX    = 32;
    const PULSE_FREQ_HZ   = 0.4;
    const LOOP_DURATION_S = 18;
    const TRAIL_LENGTH_S  = 1800;
    const STALENESS_GREEN_MS  = {{ staleness_green_ms }};
    const STALENESS_YELLOW_MS = {{ staleness_yellow_ms }};

    const container    = document.getElementById('live-deck-container');
    const timestampEl  = document.getElementById('live-timestamp');
    const dotEl        = document.getElementById('live-dot');
    const overlayEl    = document.querySelector('.live-overlay');
    const refreshBtnEl = document.getElementById('live-refresh-btn');
    if (!container || !MAPBOX_TOKEN) return;

    // Remap raw GPS timestamps to be continuous — strips idle gaps between segments.
    function buildTripsData(dayPaths) {
        let cursor = 0;
        return dayPaths.map(path => {
            const rawTs = path.map(p => p[2]);
            const offset = cursor - rawTs[0];
            cursor += rawTs[rawTs.length - 1] - rawTs[0];
            return { path: path.map(p => [p[0], p[1]]), timestamps: rawTs.map(ts => ts + offset) };
        });
    }

    let tripsData  = buildTripsData({{ day_paths | tojson }});
    let daySpanSec = tripsData.reduce((s, t) => s + (t.timestamps.at(-1) - t.timestamps[0]), 0);
    let ghostLayer = makeGhostLayer();

    function makeGhostLayer() {
        return new deck.PathLayer({
            id: 'ghost-path', data: tripsData, getPath: d => d.path,
            getColor: [255, 111, 0, 50], getWidth: 2,
            widthUnits: 'pixels', rounded: true, pickable: false,
        });
    }

    function makeTripsLayer(currentTime) {
        return new deck.TripsLayer({
            id: 'trips-trace', data: tripsData,
            getPath: d => d.path, getTimestamps: d => d.timestamps,
            getColor: ORANGE, currentTime,
            trailLength: TRAIL_LENGTH_S, widthMinPixels: 3, rounded: true, pickable: false,
        });
    }

    function makePulseLayers(elapsed) {
        const t = 0.5 + 0.5 * Math.sin(2 * Math.PI * PULSE_FREQ_HZ * elapsed);
        const radius  = PULSE_MIN_PX + t * (PULSE_MAX_PX - PULSE_MIN_PX);
        const opacity = Math.round(40 + t * 100);
        const pos = [LON, LAT];
        return [
            new deck.ScatterplotLayer({
                id: 'pulse', data: [{ position: pos }], getPosition: d => d.position,
                getRadius: radius, getFillColor: [...ORANGE, opacity],
                radiusUnits: 'pixels', stroked: false, pickable: false,
            }),
            new deck.ScatterplotLayer({
                id: 'dot', data: [{ position: pos }], getPosition: d => d.position,
                getRadius: DOT_RADIUS_PX, getFillColor: [...ORANGE, 255],
                radiusUnits: 'pixels', stroked: true,
                getLineColor: [255, 255, 255, 220], lineWidthUnits: 'pixels', getLineWidth: 2,
                pickable: true,
            }),
        ];
    }

    function formatAge(ms) {
        if (ms < 0) return 'just now';
        const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
        if (d > 0) return `${d}d ${h % 24}h ${m % 60}m ${s % 60}s ago`;
        if (h > 0) return `${h}h ${m % 60}m ${s % 60}s ago`;
        if (m > 0) return `${m}m ${s % 60}s ago`;
        return `${s % 60}s ago`;
    }

    function stalenessClass(ageMs) {
        if (ageMs <= STALENESS_GREEN_MS)  return 'live-fresh';
        if (ageMs <= STALENESS_YELLOW_MS) return 'live-stale';
        return 'live-old';
    }

    function updateTimestamp() {
        const t = HEARTBEAT_TIME && HEARTBEAT_TIME > FIX_TIME ? HEARTBEAT_TIME : FIX_TIME;
        const ageMs = Date.now() - t.getTime();
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        timestampEl.textContent = `${t.getDate()} ${t.toLocaleString(undefined, { month: 'short' })} ${hh}:${mm} · (${formatAge(ageMs)})`;
        dotEl.className = `live-dot ${stalenessClass(ageMs)}`;
    }
    updateTimestamp();
    setInterval(updateTimestamp, 1000);

    const deckInstance = new deck.DeckGL({
        container,
        mapboxApiAccessToken: MAPBOX_TOKEN,
        mapStyle: 'mapbox://styles/mapbox/dark-v11',
        mapOptions: { projection: 'mercator' },
        initialViewState: { latitude: LAT, longitude: LON, zoom: 13, bearing: 0, pitch: 0 },
        controller: true,
        getTooltip: ({ object }) => object && {
            html: `<div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:200;padding:4px 0;"><div>${LAT.toFixed(5)}, ${LON.toFixed(5)}</div></div>`,
            style: { backgroundColor: 'rgba(25,25,25,0.9)', color: 'white', border: '1px solid black', padding: '8px' },
        },
        layers: [ghostLayer, makeTripsLayer(0), ...makePulseLayers(0)],
    });

    const startTime = performance.now() / 1000;
    function animate() {
        const elapsed = performance.now() / 1000 - startTime;
        const currentTime = daySpanSec > 0 ? (elapsed % LOOP_DURATION_S) / LOOP_DURATION_S * daySpanSec : 0;
        deckInstance.setProps({ layers: [ghostLayer, makeTripsLayer(currentTime), ...makePulseLayers(elapsed)] });
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    function flashOverlay() {
        overlayEl.classList.remove('live-overlay-flash');
        void overlayEl.offsetWidth;
        overlayEl.classList.add('live-overlay-flash');
    }

    function refreshLocation() {
        fetch('/live/current')
            .then(r => r.json())
            .then(data => {
                if (data.no_data) return;
                LAT           = data.lat;
                LON           = data.lon;
                FIX_TIME      = new Date(data.last_updated_iso);
                if (data.last_heartbeat_iso) HEARTBEAT_TIME = new Date(data.last_heartbeat_iso);
                tripsData      = buildTripsData(data.day_paths);
                daySpanSec     = tripsData.reduce((s, t) => s + (t.timestamps.at(-1) - t.timestamps[0]), 0);
                ghostLayer     = makeGhostLayer();
                flashOverlay();
            })
            .catch(() => {});
    }
    refreshBtnEl.addEventListener('click', refreshLocation);
    setInterval(refreshLocation, 60_000);
})();
    </script>
    {% endif %}
</body>
</html>
